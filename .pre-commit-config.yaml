repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
      - id: ruff-format-check
        name: ruff format check
        entry: uv run ruff format --check
        language: system
        types_or: [python, pyi]
